name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ────────────────────────────────────────────────────────────────
  # Job 1 — Lint
  # ────────────────────────────────────────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"
          cache: "pip"

      - name: Instalar dependências
        run: pip install -r requirements-dev.txt

      - name: Executar ruff
        run: ruff check . --output-format=github

  # ────────────────────────────────────────────────────────────────
  # Job 2 — Testes e cobertura
  # ────────────────────────────────────────────────────────────────
  test:
    name: Testes (pytest + coverage)
    runs-on: ubuntu-latest
    needs: lint  # só roda se o lint passar

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"
          cache: "pip"

      - name: Instalar dependências
        run: pip install -r requirements-dev.txt

      - name: Executar testes com cobertura
        run: |
          pytest tests/ \
            --cov=src \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-report=html:htmlcov \
            -v

      - name: Publicar resumo de cobertura no GitHub
        if: always()
        run: |
          echo "## Relatório de Cobertura de Testes" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          python -m pytest tests/ \
            --cov=src \
            --cov-report=term-missing \
            --no-header \
            -q 2>&1 | tail -20 >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Fazer upload do relatório HTML de cobertura
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/
          retention-days: 7
